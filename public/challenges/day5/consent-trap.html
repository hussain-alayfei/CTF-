<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Consent Center</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f7f7f7;
        margin: 0;
        padding: 2rem 1rem;
      }
      .card {
        max-width: 680px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #d8d8d8;
        border-radius: 14px;
        padding: 1.2rem;
      }
      .row {
        display: flex;
        justify-content: space-between;
        border-top: 1px solid #eee;
        padding: 0.75rem 0;
      }
      button {
        margin-top: 0.8rem;
        background: #1f6feb;
        border: 0;
        color: #fff;
        font-weight: 700;
        border-radius: 8px;
        padding: 0.65rem 1rem;
        cursor: pointer;
      }
      #result {
        margin-top: 0.8rem;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Privacy Preferences</h1>
      <p>Adjust optional tracking controls and save your preferences.</p>

      <div class="row">
        <label for="essential">Essential cookies</label>
        <input id="essential" type="checkbox" checked disabled />
      </div>
      <div class="row">
        <label for="analytics">Analytics cookies</label>
        <input id="analytics" type="checkbox" checked />
      </div>
      <div class="row">
        <label for="ads">Ad personalization</label>
        <input id="ads" type="checkbox" checked />
      </div>
      <div class="row">
        <label for="fingerprint">Device fingerprinting</label>
        <input id="fingerprint" type="checkbox" checked />
      </div>

      <button id="save">Save preferences</button>
      <p id="result">No preferences saved yet.</p>
    </div>

    <script>
      const analytics = document.getElementById('analytics');
      const ads = document.getElementById('ads');
      const fingerprint = document.getElementById('fingerprint');
      const result = document.getElementById('result');

      document.getElementById('save').addEventListener('click', () => {
        const optionalAllowed = analytics.checked || ads.checked || fingerprint.checked;
        if (!optionalAllowed) {
          const parts = ['cmVqZWN0', 'X2FsbA==', 'X3RyYWNrZXJz'];
          localStorage.setItem('consent_outcome', atob(parts.join('')));
          result.textContent = 'Saved: strict privacy mode';
          return;
        }
        localStorage.setItem('consent_outcome', 'partial_or_open_mode');
        result.textContent = 'Saved: optional tracking still active';
      });
    </script>
  </body>
  </html>
