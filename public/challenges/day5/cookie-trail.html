<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consent Preferences</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        line-height: 1.5;
        color: #111;
      }
      .panel {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 1rem 1.25rem;
      }
      button {
        margin-top: 0.75rem;
        padding: 0.65rem 1rem;
        border: 1px solid #0a7d3d;
        border-radius: 8px;
        background: #0ea34d;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }
      small {
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Tracking Preferences</h1>
    <p>
      This sample page writes a tracking state only after you accept. Use it for local testing.
    </p>

    <div class="panel">
      <p id="status"><strong>Status:</strong> tracking not enabled yet.</p>
      <button id="accept">Accept tracking</button>
      <p><small>Hint for analysts: this page writes to more than one browser store.</small></p>
    </div>

    <script>
      const status = document.getElementById('status');
      document.getElementById('accept').addEventListener('click', () => {
        document.cookie = 'crumb_a=dHJhaWw=; path=/; SameSite=Lax';
        localStorage.setItem('crumb_b', '5f6f665f');
        sessionStorage.setItem('crumb_c', 'etwodu');
        status.innerHTML = '<strong>Status:</strong> tracking enabled.';
      });
    </script>
  </body>
  </html>
